<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show Image on Click</title>

<style>
    body {
        background-color: antiquewhite;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        font-family: Arial, sans-serif;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #333;
        color: white;
        margin-bottom: 20px;
        transition: 0.3s;
    }

    button:hover {
        background: #555;
    }

    img {
        display: none; /* 🔥 hidden initially */
        width: 350px;
        height: auto;

        border-radius: 20px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);

        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: 0.4s ease;
    }

    img.show {
        display: block;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: scale(0.8);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

</head>
<body>

<button onclick="toggleImage()">Show / Hide Image</button>
